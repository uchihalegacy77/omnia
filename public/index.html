<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omnia | The Universal Architecture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #f3f4f6; font-family: 'Courier New', Courier, monospace; overflow-x: hidden; transition: all 0.5s ease; }
        .glow-cyan { text-shadow: 0 0 10px rgba(0, 255, 255, 0.6), 0 0 20px rgba(0, 255, 255, 0.4); }
        .ide-panel { background: #0a0a0f; border: 1px solid #1f1f2e; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); transition: box-shadow 0.3s ease; }
        .ide-header { background: linear-gradient(90deg, #111 0%, #1a1a24 100%); border-bottom: 1px solid #a855f7; }
        textarea { outline: none; resize: none; tab-size: 4; }
        #console-output { white-space: pre-wrap; word-wrap: break-word; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; border: 1px solid #111; }
        .btn-primary { background: rgba(168, 85, 247, 0.15); border: 1px solid #a855f7; color: #e9d5ff; transition: all 0.2s; }
        .btn-primary:hover { background: rgba(168, 85, 247, 0.4); box-shadow: 0 0 20px rgba(168, 85, 247, 0.6); color: #fff; }
        .terminal-sys { color: #6b7280; } .terminal-out { color: #67e8f9; } .terminal-host { color: #eab308; } .terminal-err { color: #ef4444; } .terminal-success { color: #22c55e; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center">

    <nav class="w-full border-b border-gray-900 bg-black/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-3xl font-bold text-[#00ffff] tracking-widest glow-cyan">OMNIA</div>
            <div class="text-sm text-gray-400">Universal Engine v1.0 (Pure ASCII)</div>
        </div>
    </nav>

    <main class="w-full max-w-7xl px-4 sm:px-6 py-8 flex flex-col gap-6 flex-grow">
        <header class="text-center max-w-3xl mx-auto mb-2">
            <h1 class="text-4xl font-bold text-white mb-2">The Universal Architecture.</h1>
            <p class="text-gray-400">Infinite Precision Math. Dimensional Scoping. Pure System Output.</p>
        </header>

        <div class="w-full flex justify-between items-center bg-gray-900/40 p-3 rounded-lg border border-gray-800">
            <div class="flex items-center gap-3">
                <label class="text-sm text-gray-400">Snippet:</label>
                <select id="snippet-selector" class="bg-black border border-gray-700 text-cyan-300 text-sm rounded px-3 py-1 outline-none" onchange="loadSnippet()">
                    <option value="infinite">Infinite Mathematics</option>
                    <option value="interop">Host Interoperability</option>
                    <option value="scoping">Dimensional Scoping</option>
                </select>
            </div>
            <button onclick="executeOmnia()" class="btn-primary px-6 py-2 rounded text-sm font-bold uppercase tracking-wider">
                Compile & Run
            </button>
        </div>

        <section class="w-full grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="flex flex-col rounded-xl border border-gray-800 ide-panel h-[500px]" id="editor-panel">
                <div class="ide-header px-4 py-3 text-sm text-[#00ffff] font-bold">&lt;/&gt; main.om</div>
                <textarea id="code-editor" class="w-full flex-grow bg-transparent text-gray-200 p-5 font-mono" spellcheck="false"></textarea>
            </div>
            <div class="flex flex-col rounded-xl border border-gray-800 ide-panel h-[500px]" id="output-panel">
                <div class="ide-header px-4 py-3 text-sm text-purple-400 font-bold">&gt;&gt; Standard Output</div>
                <div id="console-output" class="w-full flex-grow bg-transparent p-5 font-mono overflow-y-auto"></div>
            </div>
        </section>
        
        <section class="w-full grid grid-cols-2 sm:grid-cols-4 gap-4 mt-2">
            <div class="bg-gray-900/50 border border-gray-800 p-3 rounded text-center"><div class="text-cyan-400 font-bold">set _ to 999..</div><div class="text-[10px] text-gray-400 uppercase">Infinite Precision</div></div>
            <div class="bg-gray-900/50 border border-gray-800 p-3 rounded text-center"><div class="text-purple-400 font-bold">invoke _ with _</div><div class="text-[10px] text-gray-400 uppercase">Host Bridge</div></div>
            <div class="bg-gray-900/50 border border-gray-800 p-3 rounded text-center"><div class="text-purple-400 font-bold">[ ] Isolation</div><div class="text-[10px] text-gray-400 uppercase">Memory Dimensions</div></div>
            <div class="bg-gray-900/50 border border-gray-800 p-3 rounded text-center"><div class="text-cyan-400 font-bold">cycle _ [ ]</div><div class="text-[10px] text-gray-400 uppercase">Turing Loop</div></div>
        </section>
    </main>

    <script>
        const snippets = {
            infinite: `sequence genesis [\n    display "Initializing Infinite Precision Math..."\n    \n    // Numbers can be infinitely large. No overflow.\n    set cosmic_scale to 999999999999999999999999999999999\n    set multiplier to 1000000000000000000000000000000000\n    \n    set universal_atoms to cosmic_scale * multiplier\n    \n    display "Calculated universe mass points:"\n    display universal_atoms\n]`,
            interop: `sequence genesis [\n    display "Connecting to Today's Tech (Host DOM)..."\n    \n    // Bridging eternal logic to present-day APIs\n    invoke "host.glow" with "#00ffff"\n    display "Command executed: Interface glowing cyan."\n    \n    set count to 0\n    cycle count < 1 [\n        // Proving it works inside scopes\n        invoke "host.glow" with "#a855f7"\n        display "Command executed: Interface glowing purple."\n        evolve count to count + 1\n    ]\n]`,
            scoping: `sequence genesis [\n    set global_data to 100\n    \n    assess global_data == 100 [\n        // Locked inside this dimension\n        set local_data to "Secret Payload"\n        display "Accessing: " + local_data\n    ]\n    \n    // 'local_data' is instantly destroyed. Zero memory leaks over trillions of years.\n    display "Dimensional isolation verified."\n]`
        };

        function loadSnippet() { 
            document.getElementById('code-editor').value = snippets[document.getElementById('snippet-selector').value]; 
            document.getElementById('editor-panel').style.boxShadow = '';
            document.getElementById('output-panel').style.boxShadow = '';
        }
        window.onload = loadSnippet;

        async function executeOmnia() {
            const raw = document.getElementById('code-editor').value;
            const term = document.getElementById('console-output');
            
            // Reset Host overrides
            document.getElementById('editor-panel').style.boxShadow = '';
            document.getElementById('output-panel').style.boxShadow = '';
            
            term.innerHTML = `<div class='terminal-sys'>[SYS] Compiling AST V1.0 (Infinite Precision Enabled)...</div>`;
            
            // Artificial delay for OS "feel"
            await new Promise(r => setTimeout(r, 100));

            try {
                // ==========================================
                // 1. LEXICAL ANALYSIS
                // Regex handles newlines, text limits, math symbols, and Infinite Math parsing.
                // ==========================================
                const rawTokens = raw.match(/\s*(sequence|display|set|evolve|to|assess|fallback|cycle|invoke|with|\[|\]|==|!=|[=<>+\-*/]|"[^"]*"|[0-9]+|[a-zA-Z_][a-zA-Z0-9_]*|[/][/].*)\s*/g) || [];
                const tokens = rawTokens.map(t => t.trim()).filter(t => t && !t.startsWith('//'));

                let pos = 0;
                const consume = () => tokens[pos++];
                const current = () => tokens[pos];
                const expect = (str) => { if(consume() !== str) throw new Error(`[OMNIA-ERR-02] Syntax Error: Expected '${str}'`); };

                // ==========================================
                // 2. ABSTRACT SYNTAX TREE (AST) PARSER
                // Converts the flat array of tokens into logical, nested tree structures.
                // ==========================================
                function parseExpr() {
                    let left = consume();
                    if (!left) throw new Error("[OMNIA-ERR-03] Unexpected End of Expression");
                    
                    // CRUCIAL: BigInt is used here to natively support Infinite Precision in JavaScript
                    let leftVal = !isNaN(left) ? BigInt(left) : left; 

                    let op = current();
                    if (['+', '-', '*', '/', '==', '!=', '<', '>'].includes(op)) {
                        consume();
                        let right = consume();
                        let rightVal = !isNaN(right) ? BigInt(right) : right;
                        return { type: 'binary', op, left: leftVal, right: rightVal };
                    }
                    return { type: 'literal', val: leftVal };
                }

                function parseBlock() {
                    expect('[');
                    let stmts = [];
                    while(current() && current() !== ']') { stmts.push(parseStmt()); }
                    expect(']');
                    return stmts;
                }

                function parseStmt() {
                    let t = consume();
                    if (t === 'display') return { type: 'display', expr: parseExpr() };
                    if (t === 'set') { let name = consume(); expect('to'); return { type: 'set', name, expr: parseExpr() }; }
                    if (t === 'evolve') { let name = consume(); expect('to'); return { type: 'evolve', name, expr: parseExpr() }; }
                    if (t === 'assess') {
                        let cond = parseExpr();
                        let trueBlock = parseBlock();
                        let falseBlock = null;
                        if (current() === 'fallback') { consume(); falseBlock = parseBlock(); }
                        return { type: 'assess', cond, trueBlock, falseBlock };
                    }
                    if (t === 'cycle') { return { type: 'cycle', cond: parseExpr(), block: parseBlock() }; }
                    if (t === 'invoke') { 
                        let target = consume(); 
                        if(!target.startsWith('"')) throw new Error("[OMNIA-ERR-22] Invoke target must be a string.");
                        expect('with'); 
                        return { type: 'invoke', target: target.slice(1,-1), expr: parseExpr() }; 
                    }
                    throw new Error(`[OMNIA-ERR-04] Unexpected token: ${t}`);
                }

                expect('sequence'); expect('genesis');
                const ast = parseBlock();

                // ==========================================
                // 3. THE ENVIRONMENT (Dimensional Scoping)
                // Ensures memory isolation. Entering a block pushes a new dict to the array.
                // Exiting pops it, immediately cleaning up garbage memory.
                // ==========================================
                let envStack = [{}];

                function getEnv(name) {
                    for (let i = envStack.length - 1; i >= 0; i--) {
                        if (envStack[i][name] !== undefined) return envStack[i][name];
                    }
                    return undefined;
                }

                function updateEnv(name, val) {
                    for (let i = envStack.length - 1; i >= 0; i--) {
                        if (envStack[i][name] !== undefined) {
                            envStack[i][name] = val;
                            return true;
                        }
                    }
                    return false;
                }

                function evalExpr(expr) {
                    const resolve = (v) => {
                        if (typeof v === 'string' && v.startsWith('"')) return v.slice(1, -1);
                        if (typeof v === 'string') {
                            let val = getEnv(v);
                            if (val !== undefined) return val;
                            throw new Error(`[OMNIA-ERR-05] Memory Error: '${v}' is undefined.`);
                        }
                        return v;
                    };

                    if (expr.type === 'literal') return resolve(expr.val);
                    if (expr.type === 'binary') {
                        let l = resolve(expr.left), r = resolve(expr.right);
                        
                        // Polymorphic Fusion (BigInt safely fused into Strings)
                        if(expr.op==='+') {
                            if(typeof l === 'string' || typeof r === 'string') return String(l) + String(r);
                            return l + r;
                        }
                        
                        // Math logic uses BigInt natively to prevent browser crashing
                        if(expr.op==='-') return l-r;
                        if(expr.op==='*') return l*r; 
                        if(expr.op==='/') return l/r;
                        if(expr.op==='==') return l===r; 
                        if(expr.op==='!=') return l!==r;
                        if(expr.op==='<') return l<r; 
                        if(expr.op==='>') return l>r;
                    }
                }

                async function runBlock(stmts) {
                    envStack.push({}); // Enter Memory Dimension
                    
                    for (let stmt of stmts) {
                        if (stmt.type === 'set') {
                            let currentScope = envStack[envStack.length - 1];
                            if (currentScope[stmt.name] !== undefined) throw new Error(`[OMNIA-ERR-06] Immutability Breach: '${stmt.name}'.`);
                            currentScope[stmt.name] = evalExpr(stmt.expr);
                        }
                        if (stmt.type === 'evolve') {
                            if (!updateEnv(stmt.name, evalExpr(stmt.expr))) {
                                throw new Error(`[OMNIA-ERR-07] Evolution Error: '${stmt.name}'.`);
                            }
                        }
                        if (stmt.type === 'display') {
                            let val = evalExpr(stmt.expr);
                            // Format BigInts nicely for output
                            term.innerHTML += `<div class='terminal-out mb-1'>[OUT] ${typeof val === 'bigint' ? val.toString() : val}</div>`;
                        }
                        if (stmt.type === 'invoke') {
                            let payload = evalExpr(stmt.expr);
                            let payloadStr = typeof payload === 'bigint' ? payload.toString() : payload;
                            
                            // Host Interoperability Logic
                            if (stmt.target === 'host.glow') {
                                document.getElementById('editor-panel').style.boxShadow = `0 0 30px ${payloadStr}`;
                                document.getElementById('output-panel').style.boxShadow = `0 0 30px ${payloadStr}`;
                                term.innerHTML += `<div class='terminal-host mb-1'>[HOST] Triggered OS UI: Glow = ${payloadStr}</div>`;
                            } else {
                                term.innerHTML += `<div class='terminal-host mb-1'>[HOST] Target: '${stmt.target}' Payload: ${payloadStr}</div>`;
                            }
                        }
                        if (stmt.type === 'assess') {
                            if (evalExpr(stmt.cond)) await runBlock(stmt.trueBlock);
                            else if (stmt.falseBlock) await runBlock(stmt.falseBlock);
                        }
                        if (stmt.type === 'cycle') {
                            let iterations = 0;
                            while (evalExpr(stmt.cond)) {
                                iterations++; 
                                // ASYNC YIELDING: Protects the browser tab from freezing during long cycles
                                if (iterations % 50 === 0) await new Promise(res => setTimeout(res, 0));
                                if (iterations > 5000) throw new Error("[OMNIA-ERR-08] Infinite Cycle Protected. CPU Halted.");
                                await runBlock(stmt.block);
                            }
                        }
                    }
                    envStack.pop(); // Exit Memory Dimension safely
                }

                await runBlock(ast);
                term.innerHTML += `<div class='terminal-success mt-2'>[OK] Execution Complete. Dimensional Memory Purged.</div>`;
            } catch (e) {
                term.innerHTML += `<div class='terminal-err mt-2'>[FATAL] ${e.message}</div>`;
            }
            term.scrollTop = term.scrollHeight;
        }
    </script>
</body>
</html>
